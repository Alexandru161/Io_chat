version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rtchat-frontend
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_WS_URL=/socket.io
    volumes:
      - frontend_dist:/shared
    depends_on:
      - backend
    networks:
      - rtchat

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: rtchat-admin-frontend
    environment:
      - VITE_API_BASE_URL=/api
    volumes:
      - admin_dist:/shared-admin
    depends_on:
      - backend
    networks:
      - rtchat

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rtchat-backend
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    networks:
      - rtchat

  postgres:
    image: postgres:16-alpine
    container_name: rtchat-postgres
    environment:
      - POSTGRES_USER=rtchat
      - POSTGRES_PASSWORD=word
      - POSTGRES_DB=rtchat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rtchat

  redis:
    image: redis:7-alpine
    container_name: rtchat-redis
    networks:
      - rtchat

  caddy:
    image: caddy:2.8-alpine
    container_name: rtchat-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv/frontend:ro
      - admin_dist:/srv/admin:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - admin-frontend
      - backend
    networks:
      - rtchat

volumes:
  frontend_dist:
  admin_dist:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  rtchat:
    driver: bridge
