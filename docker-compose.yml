version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rtchat-frontend
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_WS_URL=/socket.io
    volumes:
      - frontend_dist:/shared
    depends_on:
      - backend
    networks:
      - rtchat

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: rtchat-admin-frontend
    environment:
      - VITE_API_BASE_URL=/api
    volumes:
      - admin_dist:/shared-admin
    depends_on:
      - backend
    networks:
      - rtchat

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rtchat-backend
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    networks:
      - rtchat

  postgres:
    image: postgres:16-alpine
    container_name: rtchat-postgres
    environment:
      - POSTGRES_USER=rtchat
      - POSTGRES_PASSWORD=rtchat_password
      - POSTGRES_DB=rtchat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rtchat

  redis:
    image: redis:7-alpine
    container_name: rtchat-redis
    networks:
      - rtchat

  nginx:
    image: nginx:1.25-alpine
    container_name: rtchat-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - admin_dist:/usr/share/nginx/admin:ro
    depends_on:
      - frontend
      - admin-frontend
      - backend
    networks:
      - rtchat

volumes:
  frontend_dist:
  admin_dist:
  postgres_data:

networks:
  rtchat:
    driver: bridge
